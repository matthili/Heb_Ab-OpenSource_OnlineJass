{{/*
Sammel-Secret für App-interne Geheimnisse. Wird nur gerendert, wenn der
User KEINEN existingSecretName angegeben hat. So funktioniert
`helm install … --set secrets.appSecret=…` für Quick-Deploys, ohne dass
man Secrets vorab manuell anlegen muss.

Bei ExistingSecret übernimmt der Operator die Verantwortung — typischer
Production-Workflow.
*/}}
{{- if and (empty .Values.secrets.existingSecretName) (or .Values.secrets.betterAuthSecret .Values.secrets.appSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "jass-app.fullname" . }}-secrets
  labels:
    {{- include "jass-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  better-auth-secret: {{ required "secrets.betterAuthSecret muss gesetzt sein" .Values.secrets.betterAuthSecret | quote }}
  app-secret: {{ required "secrets.appSecret muss gesetzt sein" .Values.secrets.appSecret | quote }}
{{- end }}
---
{{- if and (empty .Values.postgres.existingSecretName) .Values.postgres.url }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "jass-app.fullname" . }}-postgres
  labels:
    {{- include "jass-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  url: {{ .Values.postgres.url | quote }}
{{- end }}
---
{{- if and (empty .Values.redis.existingSecretName) .Values.redis.host }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "jass-app.fullname" . }}-redis
  labels:
    {{- include "jass-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Fertige Verbindungs-URL — die API liest NUR REDIS_URL (redis.service.ts).
  # rediss:// bei TLS (bool ODER String "true" robust behandelt), optionaler
  # :password@-Teil, /db-Suffix. Wer ein eigenes redis-Secret via
  # `redis.existingSecretName` mitbringt, muss darin ebenfalls einen `url`-Key
  # bereitstellen (vorher reichten host/port/…).
  url: {{ printf "%s://%s%s:%v/%v" (ternary "rediss" "redis" (eq (lower (toString .Values.redis.tls)) "true")) (empty .Values.redis.password | ternary "" (printf ":%s@" .Values.redis.password)) .Values.redis.host .Values.redis.port .Values.redis.db | quote }}
  host: {{ .Values.redis.host | quote }}
  port: {{ .Values.redis.port | quote }}
  db: {{ .Values.redis.db | quote }}
  password: {{ .Values.redis.password | quote }}
  tls: {{ .Values.redis.tls | quote }}
{{- end }}

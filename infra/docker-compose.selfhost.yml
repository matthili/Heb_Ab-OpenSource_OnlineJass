# ─────────────────────────────────────────────────────────────────────────
# ZERO-CONFIG Self-Host-Stack für „Heb ab!" — privater LAN-Trial.
#
#   docker compose -f infra/docker-compose.selfhost.yml up -d --build
#
# Danach erreichbar unter  http://localhost  (auf dem Mini-PC selbst).
# Für Zugriff aus dem LAN von anderen Geräten:  JASS_HOST davor setzen, z.B.
#   JASS_HOST=http://192.168.0.42 docker compose -f infra/docker-compose.selfhost.yml up -d --build
#
# KEIN .env nötig:
#   • Secrets (APP_SECRET/BETTER_AUTH_SECRET) werden beim ersten Start im
#     api-Entrypoint generiert + auf einem Volume persistiert.
#   • DB-Migrationen laufen automatisch (api-Entrypoint, prisma migrate deploy).
#   • Mail ist AUS (ACCOUNT_ACTIVATION=admin) → neue Konten schaltet der Admin
#     im Admin-Bereich frei (kein SMTP nötig).
#   • Captcha + TLS sind AUS (SELF_HOST=1, HTTP). → NICHT öffentlich exponieren!
#   • KI = Heuristik/Zufall (kein Inferenz-Container). NN ist optional nachrüstbar
#     (pnpm sync:nn + Inferenz-Service) — NN-Sitze fallen sonst sauber auf die
#     Heuristik zurück.
#
# Ersten Admin festlegen:  ADMIN_EMAIL=<deine-mail> davor setzen → der Account
# wird beim Registrieren automatisch zum Admin.
# ─────────────────────────────────────────────────────────────────────────

# Eigener Projektname → kollidiert NICHT mit dem Dev-Stack (docker-compose.dev.yml
# liegt im selben Ordner und nutzt sonst denselben Default-Projektnamen).
name: jass-selfhost

# Gemeinsame Log-Rotation für alle Container (json-file, gedeckelt) — verhindert,
# dass Container-Logs unbemerkt die Platte füllen. Pro Service via `*logging`.
x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *logging
    environment:
      POSTGRES_DB: jass
      POSTGRES_USER: jass
      POSTGRES_PASSWORD: jass-selfhost
    volumes:
      - jass-selfhost-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jass -d jass"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [jass]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *logging
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - jass-selfhost-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [jass]

  # Automatische Backups: pg_dump + App-Daten-Tarball, mit Rotation.
  # Restore + Off-site-Hinweis: infra/backup/README.md.
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *logging
    environment:
      PGPASSWORD: jass-selfhost
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    entrypoint: ["/bin/sh", "/backup-loop.sh"]
    volumes:
      - ./backup/backup-loop.sh:/backup-loop.sh:ro
      - jass-selfhost-backups:/backups
      - jass-selfhost-data:/appdata:ro
    depends_on:
      postgres: { condition: service_healthy }
    networks: [jass]

  # Selbstheilung: startet Container neu, sobald ihr Healthcheck "unhealthy"
  # meldet — restart:unless-stopped greift nur bei Absturz, nicht bei
  # läuft-aber-hängt. Braucht Zugriff auf den Docker-Socket.
  autoheal:
    image: willfarrell/autoheal:1.2.0
    restart: unless-stopped
    logging: *logging
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
      AUTOHEAL_INTERVAL: 15
      AUTOHEAL_START_PERIOD: 60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    logging: *logging
    environment:
      NODE_ENV: production
      SELF_HOST: "1"
      API_PORT: "3000"
      DATABASE_URL: postgresql://jass:jass-selfhost@postgres:5432/jass?schema=public
      REDIS_URL: redis://redis:6379
      ACCOUNT_ACTIVATION: admin
      BETTER_AUTH_URL: ${JASS_HOST:-http://localhost}
      WEB_PUBLIC_URL: ${JASS_HOST:-http://localhost}
      LANDING_PUBLIC_URL: ${JASS_HOST:-http://localhost}
      # Internes Health-Check-Ziel der Admin-System-Status-Seite (gleicher Compose-Service).
      LANDING_URL: http://landing
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      # APP_SECRET / BETTER_AUTH_SECRET bewusst NICHT gesetzt → der Entrypoint
      # generiert sie einmalig und persistiert sie nach /app/data.
    volumes:
      - jass-selfhost-data:/app/data
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [jass]

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        # Leer = Turnstile-Widget rendert nichts, Submit nutzt „dev-bypass";
        # der Server überspringt die Prüfung (SELF_HOST, kein Secret).
        VITE_TURNSTILE_SITE_KEY: ""
    restart: unless-stopped
    logging: *logging
    networks: [jass]

  landing:
    build:
      context: ..
      dockerfile: apps/landing/Dockerfile
    restart: unless-stopped
    logging: *logging
    networks: [jass]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging: *logging
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile.selfhost:/etc/caddy/Caddyfile:ro
      - jass-selfhost-caddy:/data
    depends_on:
      api: { condition: service_healthy }
      web: { condition: service_started }
      landing: { condition: service_started }
    networks: [jass]

networks:
  jass:

volumes:
  jass-selfhost-pg:
  jass-selfhost-redis:
  jass-selfhost-data:
  jass-selfhost-backups:
  jass-selfhost-caddy:
